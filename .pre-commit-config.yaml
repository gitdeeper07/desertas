# DESERTAS Pre-commit Configuration
# Framework for Desert Emission Sensing & Energetic Rock-Tectonic Analysis System

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Clean trailing whitespace
      - id: end-of-file-fixer
        name: Ensure EOF newline
      - id: check-yaml
        name: Validate YAML syntax
        args: [--allow-multiple-documents]
      - id: check-json
        name: Validate JSON syntax
      - id: check-toml
        name: Validate TOML syntax
      - id: check-added-large-files
        name: Prevent large files
        args: [--maxkb=20480]  # 20MB limit for DRGAS datasets
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: detect-private-key
        name: Detect private keys

  - repo: https://github.com/psf/black
    rev: 24.1.0
    hooks:
      - id: black
        name: Format Python code (Black)
        language_version: python3
        args: [--line-length=88, --target-version=py310]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Sort imports (isort)
        args: ["--profile", "black", "--line-length=88"]

  - repo: local
    hooks:
      - id: validate-drgis-params
        name: Validate DRGIS parameters
        entry: python scripts/validate_parameters.py
        language: system
        files: ^desertas/parameters/.*\.py$
        pass_filenames: false
        
      - id: check-rn-pulse-correlation
        name: Check Rn_pulse correlation
        entry: python scripts/check_correlation.py --expected 0.904
        language: system
        files: ^data/radon/.*\.csv$|^data/tectonic/.*\.csv$
        pass_filenames: false
