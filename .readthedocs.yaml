# .readthedocs.yaml
# Read the Docs configuration file for DESERTAS

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  jobs:
    post_checkout:
      - echo "🏜️ Building DESERTAS documentation"
      - git fetch --unshallow || true
    pre_build:
      - python scripts/generate_api_docs.py
      - python scripts/validate_parameters.py --docs

mkdocs:
  configuration: mkdocs.yml
  fail_on_warning: false

formats:
  - pdf
  - epub

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
    - requirements: docs/requirements.txt

env:
  DESERTAS_VERSION: 1.0.0
  DRGIS_DOCS_MODE: production
  DISPLAY_PREDICTION_ACCURACY: "90.6"
  DISPLAY_LEAD_TIME: "58"

search:
  ranking:
    api/*: 3
    parameters/*: 5
    research/*: 4
    parameters/rn_pulse/: 10
    parameters/he_ratio/: 10
    research/case_studies/: 8
